<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Imagens/4.png" type="image/x-icon">
    <title>Maas - Consulta O.S.</title>
    <link rel="stylesheet" href="css/consulta-os.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="widget">

        <div class="widget-header">
            <div class="header-logo">
                <img src="Imagens/logo.png.jpg" alt="Maas">
            </div>
            <div class="header-info">
                <span class="header-title">Consulta O.S.</span>
                <span class="header-sub">Mão de Obra Produtivo</span>
                <a href="dashboard.html" class="nav-link">Ir para Painel &rarr;</a>
            </div>
        </div>

        <div id="telaConsulta" class="tela-consulta">
            <p class="instrucao">Digite o número da O.S. para consultar o status da mão de obra.</p>
            <div class="search-row">
                <input type="number" id="inputOS" placeholder="Número da O.S." class="input-os" autofocus>
                <button onclick="consultarOS()" class="btn-consultar">Consultar</button>
            </div>
            <div id="msgErro" class="msg-erro hidden"></div>
        </div>

        <div id="telaLoading" class="tela-loading hidden">
            <div class="spinner"></div>
            <span>Consultando...</span>
        </div>

        <div id="telaResultado" class="tela-resultado hidden">

            <div class="resultado-header">
                <div class="os-info">
                    <span class="os-rotulo">O.S.</span>
                    <span class="os-numero" id="lblOSResultado"></span>
                </div>
                <span id="badgeStatus" class="badge"></span>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Produtivo</th>
                            <th>Abertura M.O.</th>
                            <th>Fechamento M.O.</th>
                            <th>Horas Trab.</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaConsulta"></tbody>
                </table>
            </div>

            <div class="resultado-footer">
                <button onclick="novaConsulta()" class="btn-nova">&#8617; Nova Pesquisa</button>
            </div>

        </div>

    </div>
    <script type="module" src="js/consulta-os.js"></script>
      <footer>
        <span style="font-weight: 600; color: #6b7280;">Versão 1.00-Homolog</span>
        <span style="margin: 0 0.5rem;">|</span>
        Publicado em 20/02/2026
        <span style="margin: 0 0.5rem;">|</span>
        <span style="font-weight: 600; color: #6b7280;">BI MAAS</span>
    </footer>
</body>
</html>
